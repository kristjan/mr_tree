# Mr Tree — ESPHome port (spike). See project/esphome-migration.md.
#
# Renders the CircuitPython effects (ported to tree_effects.h) on the WS2812 strand
# via RMT+DMA, exposes a Home Assistant light + effect list + control numbers + a
# timer subsystem over the native API. Dials are added in a later step.

substitutions:
  name: mr-tree
  friendly_name: Mr Tree

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  # Copied into the build so the lambdas can call the ported effect math.
  includes:
    - tree_coords.h
    - tree_effects.h
  on_boot:
    priority: -100
    then:
      # Boot rainbow, then settle onto the default effect (mirrors the CircuitPython
      # startup: a static red->purple fill before the remembered setting).
      - light.turn_on:
          id: tree_light
          brightness: 100%
          effect: "Boot Rainbow"
      - delay: 3s
      - light.turn_on:
          id: tree_light
          effect: "Hue Shift"

esp32:
  board: adafruit_feather_esp32s3
  framework:
    type: esp-idf

logger:

# Native Home Assistant API — one-click adopt, no MQTT discovery to maintain.
api:

# Firmware push over WiFi (the "push new code over wifi" TODO item).
ota:
  - platform: esphome

# Local web UI + a low-level REST API at http://${name}.local/ — controllable from a
# browser or a custom page hitting /<domain>/<entity>/<action> (e.g.
# /light/tree/turn_on?brightness=128). Bundled JS (local) so it works without internet.
web_server:
  port: 80
  version: 3
  local: true

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Mr Tree Fallback"

# mDNS is enabled by default -> reachable as ${name}.local

# --- Dials: DISABLED pending an I2C-bus fix ---------------------------------
# The three seesaw dials sit on a marginal I2C bus (SDA GPIO3 / SCL GPIO4, power
# GPIO7) that reports "SCL held low" and returns garbage — the blocking reads
# stalled the render loop (bursty fades) and fired phantom effect/power changes.
# The full dial config (external seesaw component, i2c + GPIO7 power switch, three
# seesaw devices, encoder sensors, buttons, dial NeoPixels) is in git history at
# commit be00a6c. Re-add once the bus is reliable: pull-ups / lower clock rate /
# power-sequencing GPIO7 high before i2c init.

globals:
  - id: fx_speed          # 0..1, shared animation speed
    type: float
    restore_value: yes
    initial_value: "0.5"
  - id: hueshift_mode     # 1..5 grouping
    type: float
    restore_value: yes
    initial_value: "1"
  - id: rainbow_bandwidth # color cycles over tree height
    type: float
    restore_value: yes
    initial_value: "1"
  - id: pinwheel_repeats  # color cycles around the circle
    type: float
    restore_value: yes
    initial_value: "1"
  - id: cherry_pink       # 0..1 fraction of branches twinkling pink
    type: float
    restore_value: yes
    initial_value: "0.4"
  - id: timer_duration    # seconds
    type: float
    restore_value: yes
    initial_value: "300"

light:
  - platform: esp32_rmt_led_strip
    id: tree_light
    name: "Tree"
    pin: GPIO17            # board.A1 on the Feather ESP32-S3 (GPIO17 per CircuitPython pins.c)
    num_leds: 100
    # Custom bit timing copied from CircuitPython's neopixel_write (ports/espressif/
    # common-hal/neopixel_write). These fairy lights (Adafruit 4917) are timing-picky
    # and latch garbage on ESPHome's standard WS2812 preset; these are the exact widths
    # that drove them cleanly under CircuitPython, including the 300us reset.
    bit0_high: 316ns
    bit0_low: 948ns
    bit1_high: 700ns
    bit1_low: 564ns
    reset_high: 0us
    reset_low: 300us
    rgb_order: RGB         # the strand is wired RGB, not GRB (matches CircuitPython)
    use_dma: false         # these fairy lights are timing-picky; plain RMT matches the
                           # CircuitPython timing that drove them cleanly.
    use_psram: false       # keep the pixel buffer in internal RAM — RMT fetching pixels
                           # from PSRAM on the S3 corrupts individual LEDs (random colors).
    default_transition_length: 0.6s
    # Power caps: effects are capped in tree_effects.h (MAX_BRIGHT=0.30); color_correct
    # backstops the light's BASE color (effect=None / boot fill), which the effect cap
    # doesn't cover. color_correct does NOT reach addressable_lambda pixels on this
    # platform, so it can't double-dim the effects. gamma 0 = authored colors.
    gamma_correct: 0
    color_correct: [30%, 30%, 30%]
    effects:
      - addressable_lambda:
          name: "Hue Shift"
          update_interval: 16ms
          lambda: |-
            tree::hueshift_step(millis() / 1000.0f, id(fx_speed), (int) id(hueshift_mode));
            for (int i = 0; i < it.size(); i++) { auto c = tree::hueshift_color(i); it[i] = Color(c.r, c.g, c.b); }
      - addressable_lambda:
          name: "Rainbow Cycle"
          update_interval: 16ms
          lambda: |-
            tree::rainbow_step(millis() / 1000.0f, id(fx_speed), id(rainbow_bandwidth));
            for (int i = 0; i < it.size(); i++) { auto c = tree::rainbow_color(i, id(rainbow_bandwidth)); it[i] = Color(c.r, c.g, c.b); }
      - addressable_lambda:
          name: "Pinwheel"
          update_interval: 16ms
          lambda: |-
            tree::pinwheel_step(millis() / 1000.0f, id(fx_speed));
            for (int i = 0; i < it.size(); i++) { auto c = tree::pinwheel_color(i, (int) id(pinwheel_repeats)); it[i] = Color(c.r, c.g, c.b); }
      - addressable_lambda:
          name: "Cherry Blossom"
          update_interval: 16ms
          lambda: |-
            tree::cherry_step(millis() / 1000.0f, id(fx_speed));
            for (int i = 0; i < it.size(); i++) { auto c = tree::cherry_color(i, id(cherry_pink)); it[i] = Color(c.r, c.g, c.b); }
      - addressable_lambda:
          name: "Timer"
          update_interval: 16ms
          lambda: |-
            float now = millis() / 1000.0f;
            tree::timer_step(now);
            for (int i = 0; i < it.size(); i++) { auto c = tree::timer_color(i, now); it[i] = Color(c.r, c.g, c.b); }
      - addressable_lambda:
          name: "Boot Rainbow"
          update_interval: 33ms
          lambda: |-
            for (int i = 0; i < it.size(); i++) { auto c = tree::boot_color(i); it[i] = Color(c.r, c.g, c.b); }

number:
  - platform: template
    name: "Speed"
    id: num_speed
    min_value: 0
    max_value: 100
    step: 1
    optimistic: true
    restore_value: true
    initial_value: 50
    set_action:
      - globals.set:
          id: fx_speed
          value: !lambda "return x / 100.0f;"
  - platform: template
    name: "Hue Shift Mode"
    min_value: 1
    max_value: 5
    step: 1
    optimistic: true
    restore_value: true
    initial_value: 1
    set_action:
      - globals.set:
          id: hueshift_mode
          value: !lambda "return x;"
  - platform: template
    name: "Rainbow Bandwidth"
    min_value: 1
    max_value: 4
    step: 0.5
    optimistic: true
    restore_value: true
    initial_value: 1
    set_action:
      - globals.set:
          id: rainbow_bandwidth
          value: !lambda "return x;"
  - platform: template
    name: "Pinwheel Repeats"
    min_value: 1
    max_value: 6
    step: 1
    optimistic: true
    restore_value: true
    initial_value: 1
    set_action:
      - globals.set:
          id: pinwheel_repeats
          value: !lambda "return x;"
  - platform: template
    name: "Cherry Pink"
    min_value: 0
    max_value: 100
    step: 1
    optimistic: true
    restore_value: true
    initial_value: 40
    set_action:
      - globals.set:
          id: cherry_pink
          value: !lambda "return x / 100.0f;"
  - platform: template
    name: "Timer Duration"
    id: num_timer_duration
    min_value: 1
    max_value: 86400
    step: 1
    unit_of_measurement: s
    optimistic: true
    restore_value: true
    initial_value: 300
    set_action:
      - globals.set:
          id: timer_duration
          value: !lambda "return x;"
      - lambda: "tree::timer_set_duration(x);"

sensor:
  - platform: template
    name: "Timer Remaining"
    id: timer_remaining_sensor
    unit_of_measurement: s
    accuracy_decimals: 0
    update_interval: 1s
    lambda: "return tree::timer_remaining(millis() / 1000.0f);"

text_sensor:
  - platform: template
    name: "Timer State"
    id: timer_state_sensor
    update_interval: 1s
    lambda: |-
      switch (tree::timer_state_code()) {
        case 1: return {"active"};
        case 2: return {"paused"};
        default: return {"idle"};
      }

button:
  - platform: template
    name: "Timer Start"
    on_press:
      - lambda: "tree::timer_start(millis() / 1000.0f, id(timer_duration));"
      - light.turn_on:
          id: tree_light
          effect: "Timer"
  - platform: template
    name: "Timer Pause"
    on_press:
      - lambda: "tree::timer_pause(millis() / 1000.0f);"
  - platform: template
    name: "Timer Resume"
    on_press:
      - lambda: "tree::timer_resume(millis() / 1000.0f);"
  - platform: template
    name: "Timer Cancel"
    on_press:
      - lambda: "tree::timer_cancel();"
      - light.turn_on:
          id: tree_light
          effect: "Hue Shift"
